<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vietverse AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #1a1a1a;
        }

        /* ========== BUBBLE BUTTON ========== */
        #vv-bubble {
            position: fixed;
            bottom: 28px;
            right: 28px;
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #f0f0f0;
            box-shadow: 0 4px 20px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.08);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            padding: 0;
        }

        #vv-bubble:hover {
            transform: scale(1.07);
            box-shadow: 0 8px 28px rgba(0,0,0,0.18);
        }

        #vv-bubble img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            border-radius: 50%;
        }

        /* Fallback logo SVG shown when logo.png not found */
        #vv-bubble .vv-logo-svg {
            width: 40px;
            height: 40px;
        }

        /* Notification dot */
        #vv-bubble .notif-dot {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 12px;
            height: 12px;
            background: linear-gradient(135deg, #ff3b1f, #ff9900);
            border-radius: 50%;
            border: 2px solid #fff;
            animation: notif-pulse 2s infinite;
        }

        @keyframes notif-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* ========== CHAT PANEL ========== */
        #vv-panel {
            border: 1px solid rgba(255, 153, 0, 0.3);
            position: fixed;
            bottom: 28px;
            right: 104px;
            width: 380px;
            max-height: 460px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.14), 0 2px 8px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 9998;
            transform: scale(0.85) translateY(20px);
            transform-origin: bottom right;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
            border: 1px solid #f0f0f0;
        }

        #vv-panel.open {
            transform: scale(1) translateY(0);
            opacity: 1;
            pointer-events: all;
        }

        /* Header */
        .vv-header {
            background: #fff;
            padding: 16px 18px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f2f2f2;
            flex-shrink: 0;
        }

        .vv-header-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid #f0f0f0;
            object-fit: contain;
            background: #fafafa;
            padding: 2px;
            flex-shrink: 0;
        }

        .vv-header-info { flex: 1; min-width: 0; }

        .vv-header-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #111;
            letter-spacing: -0.01em;
        }

        .vv-header-sub {
            font-size: 0.72rem;
            color: #888;
            margin-top: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .vv-online-dot {
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
        }

        .vv-header-actions { display: flex; gap: 4px; }

        .vv-icon-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            transition: background 0.15s, color 0.15s;
            font-size: 14px;
        }

        .vv-icon-btn:hover { background: #f5f5f5; color: #333; }

        /* Messages */
        .vv-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            background: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }

        .vv-messages::-webkit-scrollbar { width: 4px; }
        .vv-messages::-webkit-scrollbar-track { background: transparent; }
        .vv-messages::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 4px; }

        /* Message rows */
        .vv-msg {
            display: flex;
            gap: 8px;
            animation: msg-in 0.25s ease;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .vv-msg.user { justify-content: flex-end; }
        .vv-msg.bot { justify-content: flex-start; }

        .vv-msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: contain;
            border: 1px solid #eee;
            background: #fff;
            padding: 2px;
            align-self: flex-end;
        }

        .vv-bubble-text {
            max-width: 76%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 0.875rem;
            line-height: 1.55;
            word-break: break-word;
        }

        .vv-msg.user .vv-bubble-text {
            background: linear-gradient(135deg, #ff3b1f 0%, #ff9900 100%);
            color: #fff;
            border-bottom-right-radius: 5px;
        }

        .vv-msg.bot .vv-bubble-text {
            background: #fff;
            color: #222;
            border-bottom-left-radius: 5px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }

        /* Typing dots */
        .vv-typing {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 11px 16px;
            background: #fff;
            border-radius: 18px;
            border-bottom-left-radius: 5px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            width: fit-content;
        }

        .vv-typing span {
            width: 7px;
            height: 7px;
            background: #ccc;
            border-radius: 50%;
            animation: vv-dot 1.3s infinite;
        }

        .vv-typing span:nth-child(2) { animation-delay: 0.2s; }
        .vv-typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes vv-dot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* Quick suggestions */
        .vv-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 4px;
        }

        .vv-suggestion-chip {
            padding: 5px 12px;
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 20px;
            font-size: 0.75rem;
            color: #555;
            cursor: pointer;
            transition: all 0.15s;
            font-family: 'Be Vietnam Pro', sans-serif;
        }

        .vv-suggestion-chip:hover {
            background: #fff5f0;
            border-color: #ff9900;
            color: #e05a00;
        }

        /* Input area */
        .vv-input-area {
            padding: 12px 14px;
            background: #fff;
            border-top: 1px solid #f2f2f2;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            flex-shrink: 0;
        }

        .vv-input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #ebebeb;
            border-radius: 22px;
            font-size: 0.875rem;
            font-family: 'Be Vietnam Pro', sans-serif;
            outline: none;
            resize: none;
            line-height: 1.4;
            max-height: 100px;
            min-height: 40px;
            transition: border-color 0.2s;
            color: #222;
            background: #fafafa;
        }

        .vv-input:focus {
            border-color: #ff9900;
            background: #fff;
        }

        .vv-input::placeholder { color: #bbb; }

        .vv-send-btn {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff3b1f, #ff9900);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, opacity 0.15s;
        }

        .vv-send-btn:hover { transform: scale(1.08); }
        .vv-send-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

        .vv-send-btn svg { width: 18px; height: 18px; }

        /* Footer note */
        .vv-footer {
            text-align: center;
            font-size: 0.65rem;
            color: #bbb;
            padding: 6px 0 10px;
            background: #fff;
            letter-spacing: 0.01em;
        }

        /* Code block inside messages */
        .vv-bubble-text pre {
            background: #f5f5f5;
            padding: 8px 10px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 0.78rem;
            margin: 6px 0;
        }

        .vv-bubble-text code {
            font-family: 'Courier New', monospace;
            font-size: 0.82em;
        }

        @media (max-width: 440px) {
            #vv-panel { width: calc(100vw - 24px); right: 12px; bottom: 40px; }
            #vv-bubble { right: 12px; bottom: 12px; }
        }
    </style>
</head>
<body>



    <!-- ===== BUBBLE BUTTON ===== -->
    <button id="vv-bubble" onclick="togglePanel()" title="Mở Vietverse AI">
        <img src="logo.png" alt="Vietverse AI" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <svg class="vv-logo-svg" style="display:none" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="20" fill="#fff"/>
            <text x="20" y="27" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial" fill="url(#bg2)">V✦</text>
            <defs>
                <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#ff3b1f"/>
                    <stop offset="100%" stop-color="#ff9900"/>
                </linearGradient>
            </defs>
        </svg>
        <span class="notif-dot" id="notif-dot"></span>
    </button>

    <!-- ===== CHAT PANEL ===== -->
    <div id="vv-panel">
        <!-- Header -->
        <div class="vv-header">
            <img class="vv-header-logo" src="logo.png" alt="Vietverse AI"
                 onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 40 40\'><circle cx=\'20\' cy=\'20\' r=\'20\' fill=\'%23fff\'/><text x=\'20\' y=\'27\' text-anchor=\'middle\' font-size=\'20\' font-weight=\'700\' font-family=\'Arial\' fill=\'%23ff6b00\'>V</text></svg>'">
            <div class="vv-header-info">
                <div class="vv-header-name">Vietverse AI</div>
                <div class="vv-header-sub">
                    <span class="vv-online-dot"></span>
                    Trực tuyến
                </div>
            </div>
            <div class="vv-header-actions">
                <button class="vv-icon-btn" onclick="togglePanel()" title="Thu nhỏ">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2">
                        <polyline points="18 15 12 9 6 15"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Messages -->
        <div class="vv-messages" id="vv-messages">
            <div class="vv-msg bot" id="welcome-msg">
                <img class="vv-msg-avatar" src="logo.png" alt="bot"
                     onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 28 28\'><circle cx=\'14\' cy=\'14\' r=\'14\' fill=\'%23fff8f0\'/><text x=\'14\' y=\'19\' text-anchor=\'middle\' font-size=\'14\' font-family=\'Arial\' fill=\'%23ff6b00\'>V</text></svg>'">
                <div>
                    <div class="vv-bubble-text">
                        🇻🇳 Xin chào! Tôi là <strong>Vietverse AI</strong> — trợ lý thông minh giúp bạn khám phá lịch sử, văn hóa và địa lý Việt Nam.<br><br>
                        Bạn muốn tìm hiểu điều gì hôm nay?
                    </div>
                    <div class="vv-suggestions" id="suggestions">
                        <button class="vv-suggestion-chip" onclick="sendSuggestion(this)">🏛️ Lịch sử Huế</button>
                        <button class="vv-suggestion-chip" onclick="sendSuggestion(this)">🎎 Văn hóa Tây Nguyên</button>
                        <button class="vv-suggestion-chip" onclick="sendSuggestion(this)">🗺️ Địa lý miền Bắc</button>
                        <button class="vv-suggestion-chip" onclick="sendSuggestion(this)">🍜 Ẩm thực 3 miền</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="vv-input-area">
            <textarea
                class="vv-input"
                id="vv-input"
                placeholder="Hỏi về Việt Nam..."
                rows="1"
                onkeydown="handleKey(event)"
                oninput="autoResize(this)"
            ></textarea>
            <button class="vv-send-btn" id="vv-send" onclick="sendMessage()" title="Gửi">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
        <div class="vv-footer">Vietverse AI · Khám phá Việt Nam</div>
    </div>

    <script>
        // ============================================
        // API CONFIG (from lamo__1_.html)
        // ============================================
        const API_KEY  = "sk-uQmI5tk7o5FdWLq852gCLO2xZTd5OmG2K9RKy7C3raEqGx6v";
        const API_URL  = "https://api.shopaikey.com/v1/chat/completions";
        const MODEL    = "gpt-5.4-nano";

        const SYSTEM_PROMPT = `Bạn là Vietverse AI — một trợ lý thông minh chuyên sâu về lịch sử, văn hóa và địa lý Việt Nam.
Nhiệm vụ của bạn:
- Giải thích các sự kiện lịch sử Việt Nam một cách chính xác, sinh động và dễ hiểu.
- Chia sẻ kiến thức về văn hóa, phong tục, lễ hội, ẩm thực, nghệ thuật dân gian của các vùng miền Việt Nam.
- Mô tả địa lý, danh lam thắng cảnh, di sản thế giới và các địa điểm đặc sắc trên khắp Việt Nam.
- Luôn trả lời bằng tiếng Việt, thân thiện, nhiệt tình và chính xác.
- Nếu câu hỏi không liên quan đến Việt Nam, hãy lịch sự hướng cuộc trò chuyện về chủ đề Việt Nam.

Hãy trả lời 1 cách ngắn gọn, dễ hiểu, tốt nhất là ngắn dưới 50 từ, trừ khi câu hỏi yêu cầu giải thích chi tiết. Sử dụng ví dụ cụ thể, so sánh hoặc ẩn dụ để làm rõ ý nếu cần.`;

        let conversationHistory = [];
        let isSending = false;
        let panelOpen = false;

        // ============================================
        // PANEL TOGGLE
        // ============================================
        function togglePanel() {
            panelOpen = !panelOpen;
            const panel = document.getElementById('vv-panel');
            const dot = document.getElementById('notif-dot');
            if (panelOpen) {
                panel.classList.add('open');
                dot.style.display = 'none';
                document.getElementById('vv-input').focus();
            } else {
                panel.classList.remove('open');
            }
        }

        // ============================================
        // SEND MESSAGE
        // ============================================
        async function sendMessage() {
            if (isSending) return;
            const input = document.getElementById('vv-input');
            const text = input.value.trim();
            if (!text) return;

            // Hide suggestions after first message
            const sugg = document.getElementById('suggestions');
            if (sugg) sugg.remove();

            appendMessage('user', text);
            conversationHistory.push({ role: 'user', content: text });
            if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);

            input.value = '';
            input.style.height = 'auto';

            isSending = true;
            document.getElementById('vv-send').disabled = true;
            showTyping();

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            { role: 'system', content: SYSTEM_PROMPT },
                            ...conversationHistory.slice(-10)
                        ],
                        temperature: 0.7,
                        max_tokens: 2000,
                        top_p: 0.9,
                        frequency_penalty: 0.4,
                        presence_penalty: 0.4,
                        stream: false
                    })
                });

                removeTyping();

                if (!res.ok) {
                    let errMsg = `Lỗi HTTP ${res.status}`;
                    try { const e = await res.json(); errMsg = e.error?.message || errMsg; } catch(_) {}
                    throw new Error(errMsg);
                }

                const data = await res.json();
                if (data.choices?.[0]?.message?.content) {
                    const reply = data.choices[0].message.content;
                    appendMessage('bot', reply);
                    conversationHistory.push({ role: 'assistant', content: reply });
                } else {
                    throw new Error('Phản hồi không đúng định dạng.');
                }

            } catch (err) {
                removeTyping();
                let msg = err.message || 'Có lỗi xảy ra.';
                if (msg.includes('Failed to fetch') || msg.includes('Network')) {
                    msg = '❌ Không thể kết nối. Kiểm tra internet hoặc thử dùng Live Server.';
                }
                appendMessage('bot', msg);
            } finally {
                isSending = false;
                document.getElementById('vv-send').disabled = false;
                document.getElementById('vv-input').focus();
            }
        }

        function sendSuggestion(btn) {
            document.getElementById('vv-input').value = btn.textContent.replace(/^[^\w\s]+\s*/, '').trim();
            const sugg = document.getElementById('suggestions');
            if (sugg) sugg.remove();
            sendMessage();
        }

        // ============================================
        // RENDER MESSAGES
        // ============================================
        function appendMessage(role, content) {
            const container = document.getElementById('vv-messages');
            const row = document.createElement('div');
            row.className = `vv-msg ${role}`;

            let formatted = content;
            // Code blocks
            formatted = formatted.replace(/```(\w+)?\n([\s\S]*?)```/g, (_, lang, code) => {
                return `<pre><code>${escHtml(code.trim())}</code></pre>`;
            });
            // Bold
            formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Newlines
            formatted = formatted.replace(/\n/g, '<br>');

            if (role === 'bot') {
                const avatarSrc = 'logo.png';
                row.innerHTML = `
                    <img class="vv-msg-avatar" src="${avatarSrc}" alt="bot"
                         onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 28 28\\'><circle cx=\\'14\\' cy=\\'14\\' r=\\'14\\' fill=\\'%23fff8f0\\'/><text x=\\'14\\' y=\\'19\\' text-anchor=\\'middle\\' font-size=\\'14\\' font-family=\\'Arial\\' fill=\\'%23ff6b00\\'>V</text></svg>'">
                    <div class="vv-bubble-text">${formatted}</div>
                `;
            } else {
                row.innerHTML = `<div class="vv-bubble-text">${formatted}</div>`;
            }

            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function showTyping() {
            const container = document.getElementById('vv-messages');
            const row = document.createElement('div');
            row.className = 'vv-msg bot';
            row.id = 'vv-typing';
            row.innerHTML = `
                <img class="vv-msg-avatar" src="logo.png" alt="bot"
                     onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 28 28\\'><circle cx=\\'14\\' cy=\\'14\\' r=\\'14\\' fill=\\'%23fff8f0\\'/><text x=\\'14\\' y=\\'19\\' text-anchor=\\'middle\\' font-size=\\'14\\' font-family=\\'Arial\\' fill=\\'%23ff6b00\\'>V</text></svg>'">
                <div class="vv-typing"><span></span><span></span><span></span></div>
            `;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const t = document.getElementById('vv-typing');
            if (t) t.remove();
        }

        function clearChat() {
            if (!confirm('Xóa toàn bộ lịch sử chat?')) return;
            conversationHistory = [];
            const container = document.getElementById('vv-messages');
            container.innerHTML = `
                <div class="vv-msg bot">
                    <img class="vv-msg-avatar" src="logo.png" alt="bot"
                         onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 28 28\\'><circle cx=\\'14\\' cy=\\'14\\' r=\\'14\\' fill=\\'%23fff8f0\\'/><text x=\\'14\\' y=\\'19\\' text-anchor=\\'middle\\' font-size=\\'14\\' font-family=\\'Arial\\' fill=\\'%23ff6b00\\'>V</text></svg>'">
                    <div class="vv-bubble-text">🗑️ Đã xóa lịch sử. Hãy bắt đầu cuộc trò chuyện mới!</div>
                </div>
            `;
        }

        // ============================================
        // HELPERS
        // ============================================
        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 100) + 'px';
        }

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }
    </script>
</body>
</html>
